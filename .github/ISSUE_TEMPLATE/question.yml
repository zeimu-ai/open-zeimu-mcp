name: ❓ 質問
description: open-zeimu-mcp の使い方について質問する
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        ご質問をお寄せください。できる限りお答えします！

  - type: textarea
    id: question
    attributes:
      label: 質問内容
      description: open-zeimu-mcp について知りたいことを教えてください
      placeholder: |
        semantic search を有効にするにはどうすればいいですか？
        EMBEDDING_BACKEND=local の設定方法を教えてください。
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: すでに試したことや、参照したドキュメントなどがあれば
      placeholder: |
        README の設定セクションを読みましたが、ONNX モデルの入手方法が分かりませんでした...
    validations:
      required: false
