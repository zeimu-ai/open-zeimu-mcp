name: 🐛 バグ報告
description: バグや予期しない動作を報告する
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます！以下の項目を記入してください。

  - type: textarea
    id: description
    attributes:
      label: バグの内容
      description: バグや予期しない動作の内容を具体的に説明してください
      placeholder: |
        `search_tax_answer` ツールで基礎控除を検索すると、エラーが返ってきます...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      placeholder: |
        1. MCP クライアントで `search_tax_answer` を呼び出す
        2. query: "基礎控除", category: "shotoku" を指定する
        3. エラーメッセージを確認する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 正しくはどのように動作すべきか説明してください
      placeholder: タックスアンサーの検索結果が返ってくるはずです
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたか（エラーメッセージがあれば含めてください）
      placeholder: |
        Error: Cannot read properties of undefined...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: open-zeimu-mcp のバージョン
      description: "`npm list @zeimu-ai/open-zeimu-mcp` で確認"
      placeholder: "0.1.0-alpha.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js バージョン
      description: "`node --version` で確認"
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: "例: macOS 15.0, Ubuntu 22.04, Windows 11"
      placeholder: "macOS 15.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット、ログ、その他参考になる情報があれば
    validations:
      required: false
